{% extends 'base_homepage.html' %}
{% load static %}
{% block title %}Password Reset Complete{% endblock %}

{% block extrahead %}
<script src="https://cdn.tailwindcss.com"></script>
<script>
    tailwind.config = {
        corePlugins: {
            preflight: false
        }
    }
</script>
{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[80vh] bg-gray-50 py-12 px-4 sm:px-6 lg:px-8 font-sans">
    <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-xl shadow-2xl border border-gray-100 text-center">
        <div>
            <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-green-100 mb-4">
                <img src="{% static 'images/checkmark-icon.png' %}" alt="Success" class="h-6 w-6">
            </div>
            <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">
                Password Reset Complete
            </h2>
            <p class="mt-4 text-sm text-gray-600">
                Your password has been set. You may go ahead and log in now.
            </p>
        </div>

        <div class="mt-6">
            <a href="{% url 'login' %}"
                class="group relative w-full flex justify-center py-2.5 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition duration-150 ease-in-out shadow-md hover:shadow-lg transform hover:-translate-y-0.5">
                Log In
            </a>
        </div>
    </div>
</div>
{% endblock %}
